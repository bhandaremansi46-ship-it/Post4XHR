<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Task</title>
    <link rel="stylesheet" href="./asset/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid ">
     <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-body">
                    <form id="inputform">
                        <div class="form-group">
                            <label for="title" class="font-weight-bold">Title <sup>*</sup></label>
                            <input type="text" class="form-control" id="title">
                        </div>
                        <div class="form-group">
                            <label for="Body" class="font-weight-bold">Body <sup>*</sup></label>
                            <textarea rows="4" id="body" class="form-control"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="UserId" class="font-weight-bold">UserId <sup>*</sup></label>
                          <select class="form-control" id="userId">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                          </select>
                        </div>
                        <button type="submit"  class="btn btn-primary btn-sm btn-block" id="addpost">Add Post</button>
                        <button  type="button"  class="btn btn-sm btn-block btn-success d-none" id="updatepost">Update post</button>
                    </form>
                </div>
            </div>
        </div>
     </div>
     <div class="row mt-5" id="cardcontainer">
        <!-- <div class="col-md-3">
            <div class="card">
                <div class="card-header">
                    <h2></h2>
                </div>
                <div class="card-body">
                    <p></p>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <button class="btn btn-primary btn-sm" id="editbtn">Edit</button>
                    <button class="btn btn-danger btn-sm" id="deletebtn">Remove</button>

                </div>
            </div>
        </div> -->

     </div>
     <div class="spinner d-none" id="spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
     </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./asset/js/app.js"></script>
</body>
</html>
